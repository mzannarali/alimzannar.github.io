    <div id="cursor-media"></div>

    <script>
        // =========================================
        // 1. CUSTOM CURSOR MEDIA TRACKER
        // =========================================
        const cursorMedia = document.getElementById('cursor-media');
        const projectRows = document.querySelectorAll('.project-row');

        // Variables for smooth interpolation (Lerp)
        let mouseX = -1000;
        let mouseY = -1000;
        let mediaX = 0;
        let mediaY = 0;

        // Master Mouse Tracker (Feeds both the Video and the Voxel Engine)
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Animation loop for smooth dragging physics
        function animateMedia() {
            mediaX += (mouseX - mediaX) * 0.15;
            mediaY += (mouseY - mediaY) * 0.15;
            cursorMedia.style.transform = `translate(${mediaX - 175}px, ${mediaY - 225}px)`;
            requestAnimationFrame(animateMedia);
        }
        animateMedia();

        // Reveal and inject media on row hover
        projectRows.forEach(row => {
            row.addEventListener('mouseenter', () => {
                const mediaSrc = row.getAttribute('data-media');
                
                if (mediaSrc !== "") {
                    // Only reconstruct HTML if hovering over a NEW project to prevent flickering
                    if (cursorMedia.getAttribute('data-loaded') !== mediaSrc) {
                        cursorMedia.setAttribute('data-loaded', mediaSrc);
                        cursorMedia.innerHTML = ''; 

                        const ext = mediaSrc.split('.').pop().toLowerCase();
                        
                        if (ext === 'mp4' || ext === 'webm') {
                            const video = document.createElement('video');
                            video.src = mediaSrc;
                            video.autoplay = true;
                            video.loop = true;
                            video.muted = true;
                            video.playsInline = true;
                            cursorMedia.appendChild(video);
                        } else {
                            const img = document.createElement('img');
                            img.src = mediaSrc;
                            cursorMedia.appendChild(img);
                        }
                    }
                }
                
                cursorMedia.style.opacity = '1';
                cursorMedia.style.transform = `translate(${mediaX - 175}px, ${mediaY - 225}px) scale(1.05)`;
            });

            row.addEventListener('mouseleave', () => {
                cursorMedia.style.opacity = '0';
            });
        });

        // =========================================
        // 2. PROXIMITY VOXEL ENGINE
        // =========================================
        const chars = "+-\\/_[]<>01";
        const headers = document.querySelectorAll('.hero h1');

        // Deconstruct the text into structural grids
        headers.forEach(h1 => {
            const text = h1.innerText;
            h1.innerHTML = ''; 
            
            text.split('').forEach(char => {
                if (char === ' ') {
                    h1.appendChild(document.createTextNode(' '));
                    return;
                }
                
                const wrapper = document.createElement('span');
                wrapper.className = 'char-voxel';

                const base = document.createElement('span');
                base.className = 'base';
                base.innerText = char;

                const grid = document.createElement('span');
                grid.className = 'voxel-grid';
                
                for(let i=0; i<4; i++){
                    const b = document.createElement('b');
                    b.innerText = chars[Math.floor(Math.random() * chars.length)];
                    grid.appendChild(b);
                }

                wrapper.appendChild(base);
                wrapper.appendChild(grid);
                h1.appendChild(wrapper);
            });
        });

        const allChars = document.querySelectorAll('.char-voxel');

        // The Render Loop (60fps collision detection)
        function animateVoxels() {
            allChars.forEach(charEl => {
                const rect = charEl.getBoundingClientRect();
                
                const charX = rect.left + rect.width / 2;
                const charY = rect.top + rect.height / 2;

                const dist = Math.hypot(mouseX - charX, mouseY - charY);

                // Smashes the letter into 4 symbols if the mouse is within 100px
                if (dist < 100) { 
                    charEl.classList.add('is-fractured');
                    
                    if(Math.random() > 0.4) {
                        const voxels = charEl.querySelectorAll('b');
                        voxels.forEach(v => {
                            v.innerText = chars[Math.floor(Math.random() * chars.length)];
                        });
                    }
                } else {
                    charEl.classList.remove('is-fractured');
                }
            });
            requestAnimationFrame(animateVoxels);
        }
        
        animateVoxels();
    </script>
